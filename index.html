function loadStorage(){
  const sugg=lsGet("mfs:suggestions");if(sugg)st.suggestions=sugg;

  const saved=lsGet("mfs:saved");if(saved)Object.assign(st.saved,saved);
  TOOLS.forEach(t=>{const rv=lsGet("mfs:rv:"+t.id);if(rv)st.reviews[t.id]=[...st.reviews[t.id],...rv];});
  st.suggestions.forEach(s=>{if(!st.reviews[s.id])st.reviews[s.id]=[];if(st.ratings[s.id]===undefined)st.ratings[s.id]=0;});
  st.loaded=true;renderBody();
}
function lsGet(k){try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;}}

function saveReview(toolId,name,text,forT,watchT,stars){
  if(!st.reviews[toolId])st.reviews[toolId]=[];
  st.reviews[toolId].push({a:name,t:text,for:forT,watch:watchT,stars:parseInt(stars)||0});
  const all=st.reviews[toolId].filter(x=>x.stars>0);
  st.ratings[toolId]=all.length?all.reduce((s,r)=>s+r.stars,0)/all.length:0;
  const seed=TOOLS.find(t=>t.id===toolId)?.seed.length||0;
  lsSet("mfs:rv:"+toolId,st.reviews[toolId].slice(seed));
  st.reviewingTool=null;renderBody();
}

  return`<div class="card" style="border-left:3px solid ${bc}">
    <div style="position:absolute;top:12px;right:12px;display:flex;gap:8px;align-items:center">
      <button onclick="toggleSaved('${tool.id}')" title="Save" style="background:none;border:none;font-size:15px;cursor:pointer;opacity:${isSaved?1:0.3}">&#128278;</button>
      <button onclick="(()=>{try{navigator.clipboard.writeText(window.location.href.split('?')[0]+'?tool=${tool.id}').then(()=>alert('Link copied!'))}catch(e){alert('Copy the URL from your browser')}})();" title="Share" style="background:none;border:none;font-size:14px;cursor:pointer;opacity:0.35">&#128279;</button>
    </div>
    <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;padding-right:64px">
      <div style="width:8px;height:8px;border-radius:50%;background:${bc};flex-shrink:0;margin-top:5px"></div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:500;color:#4A3F35;font-family:Georgia,serif">${dh(tool.name)}</div>
        <div style="font-size:12px;color:${cat.color};margin-top:2px;font-family:system-ui,sans-serif">${dh(tool.tagline||"")}</div>
        ${rc>0?`<div style="display:flex;align-items:center;gap:4px;margin-top:4px">${starsHtml(avg)}<span style="font-size:11px;color:#B8A898;font-family:system-ui,sans-serif">(${rc})</span></div>`:""}
      </div>
    </div>
    ${participantBadge}
    <p style="font-size:12px;color:#8C7B6B;line-height:1.6;margin:0 0 12px 18px;font-family:system-ui,sans-serif">
      ${ex?desc:short}
      ${desc.length>120?`<button onclick="st.expanded['${tool.id}']=!st.expanded['${tool.id}'];renderBody()" style="background:none;border:none;color:${cat.color};font-size:11px;cursor:pointer;padding:0;margin-left:4px;font-family:system-ui,sans-serif">${ex?"less":"more"}</button>`:""}
    </p>
    <div style="margin-left:18px">
      ${tool.bestFor?`<div style="margin-bottom:10px"><span style="font-size:11px;color:#8C7B6B;font-family:system-ui,sans-serif"><strong style="color:#4A3F35">Best for:</strong> ${dh(tool.bestFor)}</span></div>`:""}
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${tool.cost?`<span style="font-size:11px;padding:3px 9px;border-radius:10px;background:#E8DDD4;color:#8C7B6B;font-family:system-ui,sans-serif"><strong style="color:#4A3F35">Cost:</strong> ${dh(tool.cost)}</span>`:""}
        ${tool.timeSaved?`<span style="font-size:11px;padding:3px 9px;border-radius:10px;background:#E8DDD4;color:#8C7B6B;font-family:system-ui,sans-serif"><strong style="color:#4A3F35">Saves:</strong> ${dh(tool.timeSaved)}</span>`:""}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">${platBadge(tool.platform)}</div>
      ${tool.ease?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:11px;color:#B8A898;font-family:system-ui,sans-serif">Ease:</span>${dots(tool.ease,bc)}</div>`:""}
      ${tool.trustLabel?`<span style="display:inline-block;font-size:11px;padding:2px 9px;border-radius:10px;background:${trust.bg};color:${trust.color};margin-bottom:6px;font-family:system-ui,sans-serif">${dh(tool.trustLabel)}</span>`:""}
      ${tool.verified?`<div style="font-size:10px;color:#B8A898;margin-bottom:10px;font-family:system-ui,sans-serif">Verified ${tool.verified}</div>`:""}
      <div style="display:flex;flex-wrap:wrap;align-items:center;margin-bottom:12px">
        ${sbtn("App Store",tool.ios,cat.color)}${sbtn("Google Play",tool.android,cat.color)}
        ${tool.link?`<a href="${tool.link}" target="_blank" rel="noopener" style="font-size:11px;color:${cat.color};text-decoration:none;border-bottom:1px solid ${bc};font-family:system-ui,sans-serif">Visit website</a>`:""}
      </div>
      ${isSuggested&&tool.submitter?`<div style="font-size:11px;color:#B8A898;margin-bottom:10px;font-family:system-ui,sans-serif">Added by ${tool.submitter} &middot; ${tool.submittedAt||""}</div>`:""}
      <div style="border-top:0.5px solid #D4C4B8;padding-top:12px">
        <div style="font-size:11px;color:#B8A898;margin-bottom:8px;font-family:system-ui,sans-serif;text-transform:uppercase;letter-spacing:0.05em">Participant reviews</div>
        ${rvHtml}
        <button onclick="st.reviewingTool='${tool.id}';renderBody()" style="width:100%;margin-top:8px;padding:8px 0;font-size:12px;border:0.5px solid #D4C4B8;border-radius:8px;background:transparent;color:#8C7B6B;font-family:system-ui,sans-serif">+ Add your experience</button>
      </div>
    </div>
  </div>`;
}

function catSelector(){
  return`<div style="margin-bottom:10px">
    ${lbl("Category *")}
    <div style="display:flex;flex-wrap:wrap;gap:8px">
      ${Object.entries(CATS).map(([k,cat])=>{const active=st.selectedCat===k;return`<button onclick="selectCat('${k}')" style="display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:20px;font-size:12px;font-family:system-ui,sans-serif;cursor:pointer;font-weight:500;border:1.5px solid ${active?cat.color:cat.border};background:${active?cat.color:cat.light};color:${active?"#F5EFE8":cat.dark}">${cat.icon} ${cat.label}</button>`;}).join("")}
    </div>
  </div>`;
}

function dashboard(){
  const counts=getCounts();
  const maxT=Math.max(...Object.keys(CATS).map(k=>counts[k]?.total||0));
  const savedCount=Object.values(st.saved).filter(Boolean).length;
  return`<div style="background:#4A3F35;border-radius:14px;padding:1.25rem 1.5rem;margin-bottom:2rem">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div>
        <div style="font-size:11px;color:#B8A898;font-family:system-ui,sans-serif;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.06em">Library overview</div>
        <div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap">
          <span style="font-size:30px;font-weight:400;color:#F5EFE8;font-family:Georgia,serif">${counts._total}</span>
          <span style="font-size:13px;color:#B8A898;font-family:system-ui,sans-serif">total tools</span>
          ${st.suggestions.length>0?`<span style="font-size:11px;padding:2px 9px;border-radius:10px;background:#E8C4CC;color:#9B4E5E;font-family:system-ui,sans-serif">${st.suggestions.length} from participants</span>`:""}
          ${savedCount>0?`<span style="font-size:11px;padding:2px 9px;border-radius:10px;background:rgba(255,255,255,0.12);color:#F5EFE8;font-family:system-ui,sans-serif">&#128278; ${savedCount} saved</span>`:""}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:#B8A898;font-family:system-ui,sans-serif;margin-bottom:5px">Updates live</div>
        <div style="width:8px;height:8px;border-radius:50%;background:#8BAF9F;display:inline-block"></div>
        <span style="font-size:11px;color:#8BAF9F;font-family:system-ui,sans-serif;margin-left:5px">Live</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      ${Object.entries(CATS).map(([k,cat])=>{const c=counts[k];const pct=maxT>0?Math.round((c.total/maxT)*100):0;
        return`<div onclick="st.current='${k}';renderBody();setTimeout(()=>{const el=document.getElementById('cat-${k}');if(el)el.scrollIntoView({behavior:'smooth',block:'start'})},100)" style="background:rgba(255,255,255,0.08);border-radius:10px;padding:12px 14px;cursor:pointer;border:0.5px solid rgba(255,255,255,0.1);transition:background 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.15)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px"><span style="font-size:14px">${cat.icon}</span><span style="font-size:22px;font-weight:400;color:#F5EFE8;font-family:Georgia,serif">${c.total}</span></div>
          <div style="font-size:11px;color:#B8A898;font-family:system-ui,sans-serif;margin-bottom:7px;line-height:1.35">${cat.label}</div>
          <div style="background:rgba(255,255,255,0.1);border-radius:4px;height:3px;overflow:hidden"><div style="background:${cat.border};height:100%;width:${pct}%;border-radius:4px"></div></div>
          ${c.suggested>0?`<div style="font-size:10px;color:#C97A8A;margin-top:5px;font-family:system-ui,sans-serif">+${c.suggested} from participants</div>`:""}
        </div>`;}).join("")}
    </div>
  </div>`;
}

function savedSection(){
  const savedIds=Object.keys(st.saved).filter(id=>st.saved[id]);
  if(!savedIds.length)return"";
  const savedTools=[...TOOLS,...st.suggestions].filter(t=>savedIds.includes(t.id));
  return`<div style="margin-bottom:2.5rem">
    <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;background:#E8DDD4;margin-bottom:1.25rem;border:0.5px solid #D4C4B8">
      <span style="font-size:16px">&#128278;</span>
      <span style="font-size:16px;font-weight:400;color:#4A3F35;font-family:Georgia,serif">Your saved tools</span>
      <span style="font-size:12px;color:#8C7B6B;font-family:system-ui,sans-serif">${savedTools.length} saved</span>
    </div>
    <div class="grid">${savedTools.map(t=>toolCard(t,!!st.suggestions.find(s=>s.id===t.id))).join("")}</div>
  </div>`;
}

function suggestionSection(){
  const banner=st.lastAdded?`<div style="background:#E4EFE3;border:0.5px solid #7A9E77;border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <span style="color:#4A6741;font-size:16px">&#10003;</span>
    <div style="flex:1"><div style="font-size:13px;font-weight:500;color:#2E4229;font-family:Georgia,serif">${st.lastAdded.name} added to ${CATS[st.lastAdded.cat]?.label}</div>
    <div style="font-size:12px;color:#4A6741;margin-top:3px;font-family:system-ui,sans-serif">${st.submittedCount} tool${st.submittedCount!==1?"s":""} added this session</div></div>
    <button onclick="scrollToCat('${st.lastAdded.cat}')" style="padding:6px 14px;font-size:12px;border:0.5px solid #7A9E77;border-radius:8px;background:transparent;color:#4A6741;font-family:system-ui,sans-serif">Go there</button>
  </div>`:"";
  return`<div style="background:#E8DDD4;border:1.5px solid #D4C4B8;border-radius:14px;padding:1.5rem;margin-bottom:2rem">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div style="width:10px;height:10px;border-radius:50%;background:#C97A8A;flex-shrink:0"></div>
      <span style="font-size:13px;color:#8C7B6B;line-height:1.5;font-family:system-ui,sans-serif;flex:1">Found an AI tool that has helped you? Share it here. It appears immediately in the right category and the dashboard count updates instantly.</span>
      <button onclick="st.showSuggestBox=!st.showSuggestBox;renderBody()" style="background:none;border:0.5px solid #D4C4B8;border-radius:8px;padding:5px 14px;font-size:12px;color:#8C7B6B;font-family:system-ui,sans-serif;flex-shrink:0">${st.showSuggestBox?"Hide":"Show"}</button>
    </div>
    ${banner}
    ${st.showSuggestBox?`
      ${lbl("Tool name *")}<input id="sb-name" placeholder="e.g. Notion AI">
      ${catSelector()}
      ${lbl("What does it do? *")}<textarea id="sb-desc" placeholder="Briefly describe what this tool does and why you find it useful..."></textarea>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div>${lbl("Best for")}<input id="sb-bestfor" placeholder="e.g. Note-taking"></div>
        <div>${lbl("Cost")}<input id="sb-cost" placeholder="e.g. Free or £10 per month"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px">
        <div>${lbl("Website")}<input id="sb-link" placeholder="https://..."></div>
        <div>${lbl("App Store")}<input id="sb-ios" placeholder="https://apps.apple.com/..."></div>
        <div>${lbl("Google Play")}<input id="sb-android" placeholder="https://play.google.com/..."></div>
      </div>
      ${lbl("Your name (optional)")}<input id="sb-submitter" placeholder="Your name" style="margin-bottom:14px">
      <div style="display:flex;gap:10px;margin-top:4px"><button onclick="submitSuggestion()" style="flex:1;padding:11px 0;font-size:13px;border:none;border-radius:10px;background:#C97A8A;color:#F5EFE8;font-weight:500;font-family:system-ui,sans-serif">Submit</button><button onclick="addAnotherTool()" style="flex:1;padding:11px 0;font-size:13px;border:0.5px solid #C97A8A;border-radius:10px;background:transparent;color:#C97A8A;font-weight:500;font-family:system-ui,sans-serif">+ Add another</button></div>
    `:""}
  </div>`;
}

function reviewModal(){
  const tool=[...TOOLS,...st.suggestions].find(t=>t.id===st.reviewingTool);
  if(!tool)return"";
  const cat=CATS[tool.cat]||CATS.work;
  return`<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(74,63,53,0.6);display:flex;align-items:center;justify-content:center;z-index:999;padding:1.5rem">
    <div style="background:#F5EFE8;border-radius:14px;padding:1.75rem;width:100%;max-width:440px;border:0.5px solid #D4C4B8;max-height:90vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
        <h3 style="font-size:16px;font-weight:400;color:#4A3F35;font-family:Georgia,serif">Review ${tool.name}</h3>
        <button onclick="st.reviewingTool=null;renderBody()" style="background:none;border:none;font-size:20px;color:#8C7B6B;cursor:pointer">&#215;</button>
      </div>
      ${lbl("Star rating")}<div style="display:flex;gap:10px;margin-bottom:1rem">
        ${[1,2,3,4,5].map(i=>`<button onclick="document.querySelectorAll('.sstar').forEach((b,j)=>{b.style.color=j<${i}?'#C97A8A':'#D4C4B8'});document.getElementById('rv-stars').value=${i}" class="sstar" style="background:none;border:none;font-size:24px;color:#D4C4B8;cursor:pointer">&#9733;</button>`).join("")}
        <input type="hidden" id="rv-stars" value="0">
      </div>
      ${lbl("Your name (optional)")}<input id="rv-name" placeholder="Your name">
      ${lbl("Your experience *")}<textarea id="rv-text" placeholder="Overall thoughts..." style="min-height:70px"></textarea>
      ${lbl("What do you use it for?")}<input id="rv-for" placeholder="e.g. Drafting emails, bedtime routine...">
      ${lbl("What should others watch out for?")}<input id="rv-watch" placeholder="e.g. Free version has limits..." style="margin-bottom:1rem">
      <div style="display:flex;gap:10px">
        <button onclick="doReview('${tool.id}')" style="flex:1;padding:10px 0;font-size:13px;border:none;border-radius:10px;background:${cat.color};color:#F5EFE8;font-weight:500;font-family:system-ui,sans-serif">Submit review</button>
        <button onclick="st.reviewingTool=null;renderBody()" style="padding:10px 16px;font-size:13px;border:0.5px solid #D4C4B8;border-radius:10px;background:transparent;color:#8C7B6B;font-family:system-ui,sans-serif">Cancel</button>
      </div>
    </div>
  </div>`;
}

function renderBody(){
  const root=document.getElementById("root");
  if(!st.loaded){root.innerHTML=`<p style="padding:3rem;color:#8C7B6B;font-size:13px;font-family:system-ui,sans-serif">Loading...</p>`;return;}
  const filtered=st.current==="all"?Object.keys(CATS):[st.current];
  const byCat={};
  st.suggestions.forEach(s=>{const k=s.cat||s.category||"work";if(!byCat[k])byCat[k]=[];byCat[k].push(s);});
  const savedIds=Object.keys(st.saved).filter(id=>st.saved[id]);

  const catSections=filtered.map(ck=>{
    const cat=CATS[ck];
    const tools=TOOLS.filter(t=>t.cat===ck&&matchFilter(t));
    const suggs=(byCat[ck]||[]).filter(s=>matchFilter(s));
    if(!tools.length&&!suggs.length)return"";
    const total=tools.length+suggs.length;
    return`<div style="margin-bottom:3rem" id="cat-${ck}">
      <div style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:10px;background:${cat.light};margin-bottom:1.25rem;border:0.5px solid #D4C4B8">
        <span style="font-size:18px">${cat.icon}</span>
        <span style="font-size:17px;font-weight:400;color:${cat.dark};font-family:Georgia,serif">${cat.label}</span>
        <span style="font-size:12px;font-weight:500;color:${cat.color};background:${cat.bbg};padding:3px 12px;border-radius:10px;font-family:system-ui,sans-serif">${total}</span>
        ${suggs.length>0?`<span style="font-size:11px;padding:2px 9px;border-radius:10px;background:#E8C4CC;color:#9B4E5E;font-family:system-ui,sans-serif">${suggs.length} from participants</span>`:""}
      </div>
      <div class="grid">${[...tools.map(t=>toolCard(t,false)),...suggs.map(s=>toolCard(s,true))].join("")}</div>
    </div>`;
  }).join("");

  root.innerHTML=`
    ${st.reviewingTool?reviewModal():""}
    ${welcome()}
    <h2 class="sh">Library overview</h2>
    ${dashboard()}
    ${savedIds.length?`<h2 class="sh">Your saved tools</h2>${savedSection()}`:""}
    <h2 class="sh">Suggest a tool</h2>
    ${suggestionSection()}
    <h2 class="sh">Browse tools</h2>
    ${filters()}
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem">
      <button onclick="st.current='all';renderBody()" style="padding:7px 16px;border-radius:20px;border:1.5px solid ${st.current==="all"?"#4A3F35":"#D4C4B8"};background:${st.current==="all"?"#4A3F35":"#E8DDD4"};color:${st.current==="all"?"#F5EFE8":"#4A3F35"};font-size:12px;font-weight:500;font-family:system-ui,sans-serif">All tools</button>
      ${Object.entries(CATS).map(([k,cat])=>`<button onclick="st.current='${k}';renderBody()" style="padding:7px 16px;border-radius:20px;border:1.5px solid ${st.current===k?cat.color:cat.border};background:${st.current===k?cat.color:cat.light};color:${st.current===k?"#F5EFE8":cat.dark};font-size:12px;font-weight:500;font-family:system-ui,sans-serif">${cat.icon} ${cat.label}</button>`).join("")}
    </div>
    ${catSections}
    <div style="padding-top:1.5rem;border-top:0.5px solid #D4C4B8;text-align:center;margin-top:1rem">
      <p style="font-size:11px;color:#B8A898;font-family:system-ui,sans-serif">Mothers&#8217; Futures Studio AI Tool Library &middot; UCL Grand Challenges &times; ChangeMakers &middot; janniah.evans.19@ucl.ac.uk &middot; Verified May 2026</p>
    </div>
  `;
}

window.scrollToCat=function(ck){const el=document.getElementById("cat-"+ck);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});};
window.selectCat=selectCat;
window.flagTool=flagTool;
window.toggleSaved=toggleSaved;
window.doReview=function(id){
  const n=document.getElementById("rv-name")?.value?.trim()||"Participant";
  const t=document.getElementById("rv-text")?.value?.trim();
  const f=document.getElementById("rv-for")?.value?.trim()||"";
  const w=document.getElementById("rv-watch")?.value?.trim()||"";
  const s=document.getElementById("rv-stars")?.value||"0";
  if(!t)return;saveReview(id,n,t,f,w,s);
};
window.submitSuggestion=function(){
  const name=document.getElementById("sb-name")?.value?.trim();
  const desc=document.getElementById("sb-desc")?.value?.trim();
  const catKey=st.selectedCat||"work";
  if(!name||!desc)return;
  const id="sugg_"+Date.now();
  saveSuggestion({id,name,cat:catKey,category:catKey,tagline:"Added by a participant",desc,
    bestFor:document.getElementById("sb-bestfor")?.value?.trim()||"",
    cost:document.getElementById("sb-cost")?.value?.trim()||"",
    link:document.getElementById("sb-link")?.value?.trim()||"",
    ios:document.getElementById("sb-ios")?.value?.trim()||"",
    android:document.getElementById("sb-android")?.value?.trim()||"",
    submitter:document.getElementById("sb-submitter")?.value?.trim()||"Participant",
    submittedAt:new Date().toLocaleDateString("en-GB"),
    platform:"web",verified:"",ease:0,trust:"high",trustLabel:"",timeSaved:"",seed:[]});
  st.lastAdded={name,cat:catKey};st.submittedCount++;st.showSuggestBox=true;st._form={};
  renderBody();window.scrollTo({top:0,behavior:"smooth"});
};
window.addAnotherTool=function(){
  const name=document.getElementById("sb-name")?.value?.trim();
  const desc=document.getElementById("sb-desc")?.value?.trim();
  const catKey=st.selectedCat||"work";
  if(!name||!desc)return;
  const id="sugg_"+Date.now();
  saveSuggestion({id,name,cat:catKey,category:catKey,tagline:"Added by a participant",desc,
    bestFor:document.getElementById("sb-bestfor")?.value?.trim()||"",
    cost:document.getElementById("sb-cost")?.value?.trim()||"",
    link:document.getElementById("sb-link")?.value?.trim()||"",
    ios:document.getElementById("sb-ios")?.value?.trim()||"",
    android:document.getElementById("sb-android")?.value?.trim()||"",
    submitter:document.getElementById("sb-submitter")?.value?.trim()||"Participant",
    submittedAt:new Date().toLocaleDateString("en-GB"),
    platform:"web",verified:"",ease:0,trust:"high",trustLabel:"",timeSaved:"",seed:[]});
  st.lastAdded={name,cat:catKey};st.submittedCount++;st.showSuggestBox=true;st._form={};
  renderBody();
  // Scroll to the suggest box so user can fill in next tool
  setTimeout(()=>{const el=document.getElementById("suggest-box");if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},100);
};

loadStorage();
</script>
</body>
</html>
